name: Build CUDA Wheel on Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-and-upload-cuda-wheel:
    name: Build CUDA wheel and upload to release
    runs-on: ubuntu-22.04
    container:
      image: nvidia/cuda:12.9.1-devel-ubuntu22.04

    env:
      CUDA_HOME: /usr/local/cuda
      VLLM_TARGET_DEVICE: cuda
      VLLM_MAIN_CUDA_VERSION: "12.9"
      MAX_JOBS: "4"

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            git \
            python3 \
            python3-pip \
            python3-venv \
            python3-dev \
            build-essential

      - name: Upgrade pip tooling
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install --upgrade build wheel setuptools

      - name: Install build requirements
        run: |
          python3 -m pip install -r requirements/build.txt

      - name: Build CUDA wheel
        run: |
          python3 -m build --wheel --no-isolation
          ls -lh dist/

      - name: Upload wheel to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.whl
          fail_on_unmatched_files: true
          tag_name: ${{ github.event.release.tag_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
